name: CI

on:
  push:
    branches:
      - premium
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard-premium-files:
    name: Guard Premium Files
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Fail if premium-only files are present
        run: |
          FOUND=""
          for path in src/pro backend infra .github/SECRETS.md .github/workflows/deploy-backend.yml .github/workflows/release-electron.yml docs/REPO_STRUCTURE.md docs/LAUNCH_CHECKLIST.md docs/TESTING_GUIDE.md; do
            if [ -e "$path" ]; then
              echo "ERROR: Premium-only path found: $path"
              FOUND="$FOUND $path"
            fi
          done
          if [ -n "$FOUND" ]; then
            echo ""
            echo "These paths should only exist on the premium branch."
            echo "Remove them before pushing to origin/main."
            exit 1
          fi
          echo "No premium files found — OK"

  test-electron:
    name: Electron Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/premium'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
